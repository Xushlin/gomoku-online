<div class="board-grid">
  <span id="board-last-move-label" class="sr-only">
    {{ 'game.board.last-move-label' | transloco }}
  </span>
  @for (r of rows; track r) {
    @for (c of cols; track c) {
      <button
        type="button"
        class="board-cell focus-visible:outline-2 focus-visible:outline-offset-[-2px] focus-visible:outline-[color:var(--color-primary)] disabled:cursor-default"
        [class.board-cell--last-move]="isLastMove(r, c)"
        [attr.aria-label]="'game.board.cell-aria-label' | transloco: { row: r + 1, col: c + 1 }"
        [attr.aria-describedby]="isLastMove(r, c) ? 'board-last-move-label' : null"
        [disabled]="cellDisabled(r, c)"
        (click)="handleClick(r, c)"
      >
        @if (stoneAt(r, c) === 'Black') {
          <span class="board-stone board-stone--black" aria-hidden="true"></span>
        } @else if (stoneAt(r, c) === 'White') {
          <span class="board-stone board-stone--white" aria-hidden="true"></span>
        }
      </button>
    }
  }
</div>
