<app-auth-card [title]="'auth.change-password.title' | transloco">
  @if (bannerKey(); as key) {
    <div
      class="bg-surface text-danger border-border rounded-card mb-4 border p-3 text-sm"
      role="alert"
    >
      {{ key | transloco }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
    <label class="flex flex-col gap-1 text-sm">
      <span class="text-muted">{{ 'auth.change-password.current-label' | transloco }}</span>
      <input
        type="password"
        autocomplete="current-password"
        formControlName="currentPassword"
        class="bg-bg text-text border-border rounded-card border px-3 py-2"
      />
      @let currentCtrl = form.controls.currentPassword;
      @if (currentCtrl.touched && currentCtrl.errors) {
        <span class="text-danger text-xs">
          @if (currentCtrl.errors['required']) {
            {{ 'auth.errors.required' | transloco }}
          } @else if (currentCtrl.errors['serverKey']) {
            {{ currentCtrl.errors['serverKey'] | transloco }}
          } @else if (currentCtrl.errors['server']) {
            {{ currentCtrl.errors['server'] }}
          }
        </span>
      }
    </label>

    <label class="flex flex-col gap-1 text-sm">
      <span class="text-muted">{{ 'auth.change-password.new-label' | transloco }}</span>
      <input
        type="password"
        autocomplete="new-password"
        formControlName="newPassword"
        class="bg-bg text-text border-border rounded-card border px-3 py-2"
      />
      @let newCtrl = form.controls.newPassword;
      @if (newCtrl.touched && newCtrl.errors) {
        <span class="text-danger text-xs">
          @if (newCtrl.errors['required']) {
            {{ 'auth.errors.required' | transloco }}
          } @else if (newCtrl.errors['minlength']) {
            {{ 'auth.errors.password-min-length' | transloco }}
          } @else if (newCtrl.errors['missingLetter']) {
            {{ 'auth.errors.password-missing-letter' | transloco }}
          } @else if (newCtrl.errors['missingDigit']) {
            {{ 'auth.errors.password-missing-digit' | transloco }}
          } @else if (newCtrl.errors['serverKey']) {
            {{ newCtrl.errors['serverKey'] | transloco }}
          } @else if (newCtrl.errors['server']) {
            {{ newCtrl.errors['server'] }}
          }
        </span>
      }
    </label>

    <label class="flex flex-col gap-1 text-sm">
      <span class="text-muted">{{ 'auth.change-password.confirm-label' | transloco }}</span>
      <input
        type="password"
        autocomplete="new-password"
        formControlName="confirmPassword"
        class="bg-bg text-text border-border rounded-card border px-3 py-2"
      />
      @let confirmCtrl = form.controls.confirmPassword;
      @if (confirmCtrl.touched && confirmCtrl.errors) {
        <span class="text-danger text-xs">
          @if (confirmCtrl.errors['required']) {
            {{ 'auth.errors.required' | transloco }}
          } @else if (confirmCtrl.errors['mismatch']) {
            {{ 'auth.change-password.errors.mismatch' | transloco }}
          }
        </span>
      }
    </label>

    <button
      type="submit"
      class="bg-primary text-bg rounded-card mt-2 px-4 py-2 text-sm font-semibold disabled:opacity-50"
      [disabled]="submitting()"
    >
      @if (submitting()) {
        {{ 'auth.change-password.submit-loading' | transloco }}
      } @else {
        {{ 'auth.change-password.submit' | transloco }}
      }
    </button>
  </form>
</app-auth-card>
