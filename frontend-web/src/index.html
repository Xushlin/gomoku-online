<!doctype html>
<!--
  Default `data-theme` and `data-board-skin` are seeded here so the matching
  CSS variable blocks (tokens.css / board-skins.css) cascade on first paint —
  before ThemeService / BoardSkinService have a chance to run JS. Both
  services overwrite these attributes if the user has a stored preference.
-->
<html lang="en" data-theme="material" data-board-skin="wood">
  <head>
    <meta charset="utf-8" />
    <title>GomokuWeb</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
