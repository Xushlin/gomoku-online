name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR / branch — avoids burning minutes on
# superseded commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (.NET 10)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          # Project pins to net10.0; explicit version keeps CI honest as
          # actions/setup-dotnet's "latest" target rolls forward.
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Gomoku.slnx

      - name: Build (no restore)
        run: dotnet build Gomoku.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Gomoku.slnx --configuration Release --no-build --verbosity normal

  web:
    name: web (Angular 21)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install (clean)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (single run)
        run: npx ng test --watch=false

      - name: Build
        run: npx ng build
